<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
</head>

<body>
  <h1>Contact</h1>
  <form>
    <h2>Basic Contact</h2>
    Name <br>
    <input type="text" placeholder="Enter your name"> <br> <br>
    Email <br>
    <input type="email" placeholder="Enter your email"> <br> <br>
    Message <br>
    <input type="text" placeholder="Write yor comment here">
    <button type="submit">Submit</button>
  </form>
  <form>
    <h2>Registration form</h2>
    <table border="1">
      <tr>
        <td>Full Name:</td>
        <td><input type="text"></td>
      </tr>
      <tr>
        <td>Email:</td>
        <td><input type="email" required></td>
      </tr>
      <tr>
        <td>Password:</td>
        <td><input type="password" required></td>
      </tr>
      <tr>
        <td>Gender:</td>
        <td>
          <input type="radio" name="gender"> Male
          <input type="radio" name="gender"> Female
        </td>
      </tr>
      <tr>
        <td>Courses:</td>
        <td>
          <label><input type="checkbox" name="Courses" value="HTML">HTML</label>
          <label><input type="checkbox" name="Courses" value="CSS">CSS</label>
          <label> <input type="checkbox" name="Courses" value="JS">JAVASCRIPT</label>
        </td>
      </tr>
      <tr>
        <td>
          <button type="submit">Submit</button> <br>
        </td>
      </tr>
    </table>
  </form>
</body>

</html>
