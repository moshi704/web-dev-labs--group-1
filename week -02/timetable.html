<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timetable</title>
</head>
<body>
  <h1>Student Timetable</h1>
  <table border="2">
    <tr>
      <th>Time</th>
      <th>Monday</th>
      <th>Tuesday</th>
      <th>Wednesday</th>
      <th>Thursday</th>
      <th>Friday</th>
    </tr>
    <tbody>
      <tr>
        <td>07:00 - 09:00 </td>
        <td>English</td>
        <td rowspan="2"> Mathematics</td>
        <td>Physics</td>
        <td>Geography</td>
        <td>History</td>
      </tr>
      <tr>
        <td>10:00 - 12:00</td>
        <td>History</td>
        <td>Geography</td>
        <td>English</td>
        <td>Physics</td>
      </tr>
      <tr>
        <td>12:15 - 14:15 </td>
        <td colspan="6" align="center">Lunch Break</td>
      </tr>
      <tr>
        <td>14:20 - 16:20</td>
        <td>Physics</td>
        <td>English</td>
        <td>Chemistry</td>
        <td>History</td>
        <td>Geography</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
